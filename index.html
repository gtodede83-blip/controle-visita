<!DOCTYPE html>
<html>
<head>
  <title>Controle de Visitas</title>
</head>
<body>

<h1>Controle de Visitas</h1>

<input type="date" id="data">
<input type="number" id="loja" placeholder="ID Loja">
<input type="number" id="enc" placeholder="ID Encarregado">
<input type="text" id="obs" placeholder="Observação">

<button onclick="salvar()">Salvar</button>

<ul id="lista"></ul>

<script>
// 🔥 NÃO PRECISA URL
const API = "";

async function salvar() {
  try {
    await fetch(API + "/visitas", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        data: document.getElementById("data").value,
        loja_id: document.getElementById("loja").value,
        encarregado_id: document.getElementById("enc").value,
        observacao: document.getElementById("obs").value
      })
    });

    limparCampos();
    carregar();

  } catch (erro) {
    alert("Erro ao salvar");
    console.error(erro);
  }
}

function limparCampos() {
  document.getElementById("data").value = "";
  document.getElementById("loja").value = "";
  document.getElementById("enc").value = "";
  document.getElementById("obs").value = "";
}

async function carregar() {
  try {
    let res = await fetch(API + "/visitas");
    let dados = await res.json();

    document.getElementById("lista").innerHTML =
      dados.map(v => `
        <li>
          📅 ${v.data || "-"} | 🏪 ${v.loja || "-"} | 👤 ${v.encarregado || "-"}
        </li>
      `).join("");

  } catch (erro) {
    console.error("Erro ao carregar:", erro);
  }
}

carregar();
</script>

</body>
</html>
